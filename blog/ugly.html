<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DashNetworks WiFi</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#00b300;
}

.wrapper{
    width:420px;
    max-width:95%;
    margin:30px auto;
    background:#fff;
    border:4px solid #008000;
}

.header{
    background:#009900;
    color:#fff;
    text-align:center;
    padding:20px;
}

.header h1{
    font-size:38px;
}

.header p{
    font-size:18px;
    margin-top:5px;
}

.price{
    margin:20px;
    border:2px solid #008000;
    background:#eaffea;
}

.price div{
    display:flex;
    justify-content:space-between;
    padding:15px;
    font-size:22px;
    border-bottom:1px solid #b5d9b5;
}

.price div:last-child{
    border:none;
}

.price strong{
    color:#008000;
}

.login{
    margin:20px;
}

.login h2{
    text-align:center;
    margin-bottom:15px;
    color:#006600;
}

input{
    width:100%;
    padding:15px;
    font-size:18px;
    margin-bottom:15px;
    border:2px solid green;
}

button{
    width:100%;
    padding:15px;
    font-size:20px;
    font-weight:bold;
    background:#00aa00;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#008800;
}

.info{
    margin:20px;
    padding:15px;
    background:#ffffcc;
    border:1px solid #cccc00;
    font-size:14px;
}

.footer{
    background:#009900;
    color:white;
    text-align:center;
    padding:15px;
    font-size:14px;
}
</style>

</head>
<body>

<div class="wrapper">

    <div class="header">
        <h1>DashNetworks</h1>
        <p>Wireless Internet Hotspot</p>
    </div>

    <div class="price">

        <div>
            <span>1 Day</span>
            <strong>UGX 1,000</strong>
        </div>

        <div>
            <span>1 Week</span>
            <strong>UGX 6,000</strong>
        </div>

        <div>
            <span>1 Month</span>
            <strong>UGX 26,000</strong>
        </div>

    </div>

    <div class="login">

        <h2>Voucher Login</h2>

        <input
            type="text"
            placeholder="Enter Voucher Code">

        <button>
            CONNECT
        </button>

    </div>

    <div class="info">
        Purchase a voucher from reception or an authorized agent.<br><br>

        Need help?<br>

        <strong>0753 300 656</strong>
    </div>

    <div class="footer">
        © DashNetworks WiFi Hotspot
    </div>

</div>

</body>
</html>
