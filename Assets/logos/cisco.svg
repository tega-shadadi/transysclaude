<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Cisco bridge/signal bars - 8 bars in arc formation -->
  <g transform="translate(10, 2)">
    <!-- Bar 1 (leftmost, shortest) -->
    <rect x="0"  y="20" width="8" height="14" rx="3" fill="#1BA0D7"/>
    <!-- Bar 2 -->
    <rect x="12" y="14" width="8" height="20" rx="3" fill="#1BA0D7"/>
    <!-- Bar 3 -->
    <rect x="24" y="8"  width="8" height="26" rx="3" fill="#1BA0D7"/>
    <!-- Bar 4 (tallest - center) -->
    <rect x="36" y="4"  width="8" height="30" rx="3" fill="#1BA0D7"/>
    <!-- Bar 5 -->
    <rect x="48" y="8"  width="8" height="26" rx="3" fill="#1BA0D7"/>
    <!-- Bar 6 -->
    <rect x="60" y="14" width="8" height="20" rx="3" fill="#1BA0D7"/>
    <!-- Bar 7 (rightmost, shortest) -->
    <rect x="72" y="20" width="8" height="14" rx="3" fill="#1BA0D7"/>
  </g>
  <!-- Wordmark -->
  <text x="10" y="56" font-family="Arial, sans-serif" font-weight="400" font-size="20" fill="#1BA0D7" letter-spacing="1">cisco</text>
</svg>
